<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>¡Sí! 🎉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body class="yes-page">
    <div class="hearts-bg"></div>

    <div class="container yes-container">
        <div class="letter-layout">
            <div class="side-gifs">
                <img class="side-gif" src="https://media.tenor.com/z817NMVQFp0AAAAi/mimibubu.gif" alt="celebrando">
                <img class="side-gif" src="https://media.tenor.com/y4pyJKc3_mAAAAAi/tkthao219-bubududu.gif" alt="celebrando">
                <img class="side-gif" src="https://media.tenor.com/Y9q-5j99QloAAAAi/%EA%B3%A0%EC%96%91%EC%9D%B4-%EB%96%A1%EB%83%A5%EC%9D%B4.gif" alt="celebrando">
            </div>

            <div class="letter-content">
                <h1 class="yes-title">Cartita a mi amor:</h1>
                <div class="love-letter">
                    <p class="letter-text" id="letter-text"></p>
                </div>
                <div class="pagination">
                    <button class="page-btn" id="prev-btn" onclick="prevPage()">← Anterior</button>
                    <span class="page-indicator" id="page-indicator"></span>
                    <button class="page-btn" id="next-btn" onclick="nextPage()">Siguiente →</button>
                </div>
            </div>

            <div class="side-gifs">
                <img class="side-gif" src="https://media.tenor.com/2OTJxQkUslQAAAAi/chubby-cute.gif" alt="celebrando">
                <img class="side-gif" src="https://media.tenor.com/BMoJ4B4kPnwAAAAi/lucky-heart-heart.gif" alt="celebrando">
                <img class="side-gif" src="https://media.tenor.com/7EAhO5wXlsoAAAAi/cat-life.gif" alt="celebrando">
            </div>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="music/New West - Those Eyes (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="yes-script.js"></script>
</body>
</html>
